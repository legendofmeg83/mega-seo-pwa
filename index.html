<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meg Studio</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0b1020;
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

label{
display:block;
margin-top:20px;
}

textarea,input,select{
width:100%;
padding:12px;
margin-top:5px;
background:#161b33;
color:white;
border:none;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px;
background:#4f7cff;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

button.secondary{
background:#333a60;
}

.output{
margin-top:25px;
background:#161b33;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container">

<h1>Meg Studio</h1>

<label>Chaîne</label>
<select id="channel">

<option value="none">Aucune chaîne</option>

<option value="TheLegendOf_Meg">TheLegendOf_Meg</option>

<option value="WillXP">WillXP</option>

</select>

<label>Jeu</label>
<input id="game" placeholder="ex : Resident Evil Requiem">

<label>Objectif / moment clé</label>
<input id="goal" placeholder="ex : sauver Helena">

<label>Résumé rapide</label>
<textarea id="summary" placeholder="Résumé rapide de la vidéo"></textarea>

<label>Transcript YouTube (optionnel)</label>
<textarea id="transcript" placeholder="Colle ici le transcript si tu en as un"></textarea>

<button onclick="generatePrompt()">Générer prompt IA</button>

<button class="secondary" onclick="copyPrompt()">Copier prompt</button>

<button class="secondary" onclick="openChatGPT()">Ouvrir ChatGPT</button>

<div id="prompt" class="output"></div>

</div>

<script>

const profiles = {

none:{
name:"",
cta:"",
socials:""
},

TheLegendOf_Meg:{
name:"TheLegendOf_Meg",
cta:"Si la vidéo te plaît abonne-toi et laisse un 👍",
socials:"YouTube / Twitch / TikTok / Instagram : TheLegendOf_Meg"
},

WillXP:{
name:"WillXP",
cta:"Abonne-toi pour la suite !",
socials:"Twitch : willxp83 | TikTok : willxp91 | Facebook : WillXP"
}

}


function generatePrompt(){

const channel = document.getElementById("channel").value

const game = document.getElementById("game").value

const goal = document.getElementById("goal").value

const summary = document.getElementById("summary").value

const transcript = document.getElementById("transcript").value

const profile = profiles[channel]


const prompt = `Tu es un expert SEO YouTube gaming FR.

Ta mission : produire un pack SEO ULTRA PRO basé sur le contenu réel de la vidéo.

RÈGLES IMPORTANTES

- Style naturel, immersif et jamais putaclic
- Pas de titres mensongers
- Pas d'abus de majuscules
- Maximum 2 ou 3 emojis dans toute la sortie
- Adapter le ton au type de jeu (horreur, chill, narratif…)

À PRODUIRE

1) TITRES (10)
- 2 SEO safe
- 4 accroche sobres
- 4 variations courtes

2) DESCRIPTION LONGUE
- Hook 2 lignes maximum
- contexte + valeur
- chapitres
- CTA + réseaux

3) DESCRIPTION COURTE

4) CHAPITRES

5) TAGS

6) TAGS ≤ 500 caractères

7) HASHTAGS

8) COMMENTAIRE ÉPINGLÉ


INFORMATIONS

Chaîne : ${profile.name}

Jeu : ${game}

Objectif : ${goal}

Résumé de la vidéo :
${summary}

Transcript :
${transcript}

CTA :
${profile.cta}

Réseaux :
${profile.socials}

Format de sortie clair avec sections.`


document.getElementById("prompt").textContent = prompt

}



function copyPrompt(){

const text = document.getElementById("prompt").textContent

navigator.clipboard.writeText(text)

alert("Prompt copié")

}



function openChatGPT(){

window.open("https://chatgpt.com")

}

</script>

</body>

</html>
