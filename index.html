<script>

function checkPwd(){

if(document.getElementById("pwd").value===password){

}else{

function generate(){

let game=document.getElementById("game").value
let episode=document.getElementById("episode").value
let goal=document.getElementById("goal").value
let keywords=document.getElementById("keywords").value
let channel=document.getElementById("channel").value

let titles=
game+" Gameplay FR\n"+

goal+" | "+game+"\n"+

game+" Episode "+episode

let desc=
"🎮 "+game+" épisode "+episode+"\n\n"+
goal+"\n\n"+
"Abonne toi pour la suite."

let tags=
game+", gameplay fr, walkthrough, let's play, "+keywords

let tags500=tags.substring(0,500)

let shorts=
game+" "+goal+"\n\n#gaming #shorts #gameplay"

let prompt=
"Crée un pack SEO YouTube.\n\n"+
"Jeu : "+game+"\n"+
"Episode : "+episode+"\n"+
"Objectif : "+goal+"\n"+
"Chaîne : "+channel+"\n"+
"Mots clés : "+keywords+"\n\n"+
"Génère :\n"+
"- titres SEO\n"+
"- description optimisée\n"+
"- tags\n"+
"- hashtags\n"+
"- commentaire épinglé"

document.getElementById("titles").textContent=titles
document.getElementById("description").textContent=desc
document.getElementById("tags").textContent=tags
document.getElementById("tags500").textContent=tags500
document.getElementById("shorts").textContent=shorts
document.getElementById("prompt").textContent=prompt

}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("prompt").textContent)
}

function copyTitles(){
navigator.clipboard.writeText(document.getElementById("titles").textContent)
}

function copyDescription(){
navigator.clipboard.writeText(document.getElementById("description").textContent)
}

function copyTags(){
navigator.clipboard.writeText(document.getElementById("tags").textContent)
}

function copyOpenChatGPT(){

copyPrompt()

window.open("https://chatgpt.com","_blank")

}
<script>
// ====== V3: Profils + Presets + Copier + Tags<=500 + Sauvegarde ======

    ],

    vibe: "Chill"
  },
  "WillXP": {
    displayName: "WillXP",
    socials: [
      "Twitch : willxp83",
      "TikTok : willxp91",
      "Facebook : WillXP"
    ],
    cta: "Si ça t’a plu, abonne-toi pour la suite et dis-moi ce que tu ferais à ma place 👇",
    vibe: "Narratif"
  }
};

const PRESETS = {
  "Let's Play (chill)": {
    titleStyle: "Accroche",
    hashtags: ["#gaming", "#letsplay", "#gameplay", "#walkthrough", "#francais", "#narration"],
    chapters: ["Intro", "Début gameplay", "Exploration", "Moment clé", "Fin"]
  },
  "Soluce Sanctuaire (BOTW/TOTK)": {
    titleStyle: "SEO safe",
    hashtags: ["#zelda", "#botw", "#totk", "#sanctuaire", "#soluce", "#walkthrough"],
    chapters: ["Départ", "Mécanique", "Solution", "Coffre", "Sortie"]
  },
  "Boss Fight": {
    titleStyle: "Accroche",
    hashtags: ["#bossfight", "#gaming", "#walkthrough", "#gameplay", "#fr"],
    chapters: ["Setup", "Phase 1", "Phase 2", "Finish"]
  }
};

// ---- Helpers
function $(id){ return document.getElementById(id); }

function cleanLines(s){
  return (s || "").split("\n").map(l=>l.trim()).filter(Boolean).join("\n");
}

function uniq(arr){
  return Array.from(new Set(arr.map(x=>x.trim()).filter(Boolean)));
}

function splitKeywords(raw){
  if(!raw) return [];
  // accepte virgules OU lignes
  return raw
    .split(/[\n,]/g)
    .map(x=>x.trim())
    .filter(Boolean);
}

function toTagList(tags){
  return uniq(tags).join(", ");
}

function clamp500(str){
  if(str.length <= 500) return str;
  // coupe proprement au dernier ", "
  let cut = str.slice(0, 500);
  const lastComma = cut.lastIndexOf(", ");
  if(lastComma > 50) cut = cut.slice(0, lastComma);
  return cut;
}

function copyText(text){
  navigator.clipboard.writeText(text);
}

// ---- UI wiring (ajoute ces IDs dans ton HTML si pas déjà)
function ensureV3Ui(){
  // Tags counters
  if($("tags500Count")) return; // déjà
  const tagsBox = $("tags");
  if(!tagsBox) return;

  const info = document.createElement("div");
  info.style.opacity = "0.8";
  info.style.marginTop = "-10px";
  info.style.marginBottom = "20px";
  info.innerHTML = `
    <div>Tags ≤ 500 : <span id="tags500Count">0</span> caractères</div>
  `;
  tagsBox.parentElement.appendChild(info);

  const btnRow = document.createElement("div");
  btnRow.style.display = "flex";
  btnRow.style.gap = "10px";
  btnRow.style.flexWrap = "wrap";
  btnRow.style.marginTop = "10px";
  btnRow.innerHTML = `
    <button id="copyTitlesBtn" type="button">Copier Titres</button>
    <button id="copyDescBtn" type="button">Copier Description</button>
    <button id="copyTagsBtn" type="button">Copier Tags</button>
    <button id="copyHashBtn" type="button">Copier Hashtags</button>
  `;
  tagsBox.parentElement.appendChild(btnRow);

  $("copyTitlesBtn").onclick = () => copyText($("titles").textContent || "");
  $("copyDescBtn").onclick   = () => copyText($("description").textContent || "");
  $("copyTagsBtn").onclick   = () => copyText($("tags").textContent || "");
  $("copyHashBtn").onclick   = () => copyText($("hashtagsOut")?.textContent || "");
}

// ---- Save/Load (localStorage)
function saveForm(){
  const data = {
    channel: $("channel")?.value || "",
    preset: $("preset")?.value || "",
    game: $("game")?.value || "",
    episode: $("episode")?.value || "",
    goal: $("goal")?.value || "",
    keywords: $("keywords")?.value || "",
    playlist: $("playlist")?.value || ""
  };
  localStorage.setItem("megStudioForm", JSON.stringify(data));
}

function loadForm(){
  const raw = localStorage.getItem("megStudioForm");
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    if($("channel")) $("channel").value = data.channel || $("channel").value;
    if($("preset")) $("preset").value = data.preset || $("preset").value;
    if($("game")) $("game").value = data.game || "";
    if($("episode")) $("episode").value = data.episode || "";
    if($("goal")) $("goal").value = data.goal || "";
    if($("keywords")) $("keywords").value = data.keywords || "";
    if($("playlist")) $("playlist").value = data.playlist || "";
  }catch(e){}
}

// ---- Main generate
function generateV3(){
  const channel = $("channel").value;
  const presetKey = $("preset")?.value || "Let's Play (chill)";
  const preset = PRESETS[presetKey] || PRESETS["Let's Play (chill)"];

  const profile = PROFILES[channel] || PROFILES["TheLegendOf_Meg"];

  const game = ($("game").value || "").trim();
  const episode = ($("episode").value || "").trim();
  const goal = ($("goal").value || "").trim();
  const playlist = ($("playlist")?.value || "").trim();

  const kws = splitKeywords($("keywords")?.value || "");

  // ---- TITLES (simple mais efficaces sans IA)
  const base = game ? game : "Jeu";
  const epTxt = episode ? `Épisode ${episode}` : "Épisode";
  const goalTxt = goal ? goal : "moment clé";

  const titles = [
    `${base} – ${epTxt} | ${goalTxt}`,
    `${base} FR – ${epTxt} | Walkthrough`,
    `${goalTxt}… on tente tout (${base})`,
    `Ça bascule ici… ${base} | ${epTxt}`,
    `${base} | ${goalTxt} (FR)`,
    `${base} – ${epTxt} (chill)`,
    `${base} – ${goalTxt}`,
    `${base} FR | ${epTxt}`
</script>
