<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meg Studio</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#0b0f1a;
color:white;
margin:0;
padding:20px;
}

.card{
background:#121a2a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:6px;
border:none;
background:#1e2742;
color:white;
}

button{
background:#4d7cff;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:bold;
margin-top:5px;
}

button.secondary{
background:#22304f;
}

pre{
background:#1e2742;
padding:10px;
border-radius:8px;
white-space:pre-wrap;
}

#login{
max-width:400px;
margin:auto;
margin-top:100px;
}

#app{
display:none;
}
</style>

</head>

<body>

<div id="login" class="card">

<h2>🔒 Accès Meg Studio</h2>

<input type="password" id="pwd" placeholder="Mot de passe">

<button onclick="checkPwd()">Entrer</button>

</div>

<div id="app">

<div class="card">

<h2>🎮 Infos vidéo</h2>

<label>Chaîne</label>
<select id="channel">
<option value="meg">TheLegendOf_Meg</option>
<option value="will">WillXP83</option>
</select>

<label>Jeu</label>
<input id="game" placeholder="Ex : Syberia Remastered">

<label>Episode</label>
<input id="episode">

<label>Objectif</label>
<input id="goal">

<label>Mots clés</label>
<input id="keywords">

<button onclick="generate()">🚀 Générer</button>

</div>

<div class="card">

<h3>Prompt IA</h3>

<button class="secondary" onclick="copyPrompt()">📋 Copier prompt</button>

<button class="secondary" onclick="copyOpenChatGPT()">🤖 Copier + ouvrir ChatGPT</button>

<pre id="prompt"></pre>

</div>

<div class="card">

<h3>Titres</h3>

<button class="secondary" onclick="copyTitles()">📋 Copier titres</button>

<pre id="titles"></pre>

</div>

<div class="card">

<h3>Description</h3>

<button class="secondary" onclick="copyDescription()">📋 Copier description</button>

<pre id="description"></pre>

</div>

<div class="card">

<h3>Tags</h3>

<button class="secondary" onclick="copyTags()">📋 Copier tags</button>

<pre id="tags"></pre>

</div>

<div class="card">

<h3>Tags ≤ 500 caractères</h3>

<pre id="tags500"></pre>

</div>

<div class="card">

<h3>Pack Shorts / TikTok</h3>

<pre id="shorts"></pre>

</div>

</div>

<script>

function checkPwd(){

const password="MegWillXP"

if(document.getElementById("pwd").value===password){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("Mot de passe incorrect")

}

}

function generate(){

let game=document.getElementById("game").value
let episode=document.getElementById("episode").value
let goal=document.getElementById("goal").value
let keywords=document.getElementById("keywords").value
let channel=document.getElementById("channel").value

let titles=
game+" Gameplay FR\n"+
game+" Let's Play Episode "+episode+"\n"+
goal+" | "+game+"\n"+
game+" Walkthrough FR\n"+
game+" Episode "+episode

let desc=
"🎮 "+game+" épisode "+episode+"\n\n"+
goal+"\n\n"+
"Abonne toi pour la suite."

let tags=
game+", gameplay fr, walkthrough, let's play, "+keywords

let tags500=tags.substring(0,500)

let shorts=
game+" "+goal+"\n\n#gaming #shorts #gameplay"

let prompt=
"Crée un pack SEO YouTube.\n\n"+
"Jeu : "+game+"\n"+
"Episode : "+episode+"\n"+
"Objectif : "+goal+"\n"+
"Chaîne : "+channel+"\n"+
"Mots clés : "+keywords+"\n\n"+
"Génère :\n"+
"- titres SEO\n"+
"- description optimisée\n"+
"- tags\n"+
"- hashtags\n"+
"- commentaire épinglé"

document.getElementById("titles").textContent=titles
document.getElementById("description").textContent=desc
document.getElementById("tags").textContent=tags
document.getElementById("tags500").textContent=tags500
document.getElementById("shorts").textContent=shorts
document.getElementById("prompt").textContent=prompt

}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("prompt").textContent)
}

function copyTitles(){
navigator.clipboard.writeText(document.getElementById("titles").textContent)
}

function copyDescription(){
navigator.clipboard.writeText(document.getElementById("description").textContent)
}

function copyTags(){
navigator.clipboard.writeText(document.getElementById("tags").textContent)
}

function copyOpenChatGPT(){

copyPrompt()

window.open("https://chatgpt.com","_blank")

}

</script>

</body>
</html>
